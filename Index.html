<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web App</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding-top: 50px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 10px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        /* Makes it look good on phones */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .container { padding-top: 30px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My App 🎉</h1>
        <p>Your HTML web application is now live on GitHub Pages!</p>
        
        <a href="#" class="btn">Get Started</a>
        <a href="#" class="btn">Learn More</a>
        
        <p style="margin-top: 60px; font-size: 0.9rem; opacity: 0.7;">
            Built with ❤️ and hosted on GitHub
        </p>
    </div>
</body>
</html>
